<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Font Brooke</title>

<style>
/* IMPORT FONT */
@font-face {
  font-family: 'BrookeSmithScript';
  src: url('asset/font/amoresa.otf') format('truetype');
  font-display: swap;
}

/* STYLE */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #222;
}

/* NAMA */
.names2 {
  font-family: 'BrookeSmithScript', cursive;
  font-size: 75px;
  letter-spacing: 3px;
  color: #c59d5f;
  text-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
/* css button */
.btn-buka-hp {
  width: 100%;               /* full lebar HP */
  max-width: 280px;          /* biar tetap elegan */
  padding: 14px 20px;

  font-size: 16px;
  font-weight: 500;

  border: none;
  border-radius: 40px;

  color: white;
  background: linear-gradient(135deg, #ff6b9a, #ff9a9e);

  box-shadow: 0 6px 20px rgba(255, 107, 154, 0.4);

  transition: all 0.25s ease;

  display: block;
  margin: 10px auto 0;       /* center */
}

/* efek tekan (PENTING di HP) */
.btn-buka-hp:active {
  transform: scale(0.97);
  box-shadow: 0 3px 10px rgba(255, 107, 154, 0.4);
}

/* hover untuk desktop (optional) */
.btn-buka-hp:hover {
  transform: translateY(-2px);
}

/* RESPONSIVE EXTRA KECIL */
@media (max-width: 360px) {
  .btn-buka-hp {
    font-size: 14px;
    padding: 12px 18px;
  }
}
</style>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<h1 class="names2">Yudi & Melia</h1>
<div>
<button class="btn-buka-hp" onclick="bukaUndangan()">
  💌 Buka Undangan
</button>
</div>
</body>
</html>
